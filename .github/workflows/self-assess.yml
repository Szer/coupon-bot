name: Daily Self-Assessment

on:
  schedule:
    - cron: '37 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
    - name: Close stale orchestration issues
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        # Close any open orchestration/summary issues from previous runs
        # Match any issue with self-assess label containing "self-assessment" in title
        gh issue list \
          --repo "${{ github.repository }}" \
          --label "self-assess" \
          --state open \
          --json number,title \
          --jq '.[] | select(.title | test("self-assessment \\d{4}-\\d{2}-\\d{2}"; "i")) | .number' \
        | while read -r NUM; do
          echo "Closing orchestration issue #${NUM}"
          gh issue close "$NUM" \
            --repo "${{ github.repository }}" \
            --comment "🧹 **Auto-closed by cleanup.** Copilot did not close this issue in time. Check the linked PR (if any) for Copilot's analysis summary." \
            || echo "WARNING: Failed to close orchestration issue #${NUM}, continuing"
        done

    - name: Close stale Copilot PRs
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        # Close any open PRs created by Copilot for self-assessment
        gh pr list \
          --repo "${{ github.repository }}" \
          --state open \
          --author "app/copilot-swe-agent" \
          --json number,headRefName,title \
          --jq '.[] | select(.title | test("self-assessment \\d{4}-\\d{2}-\\d{2}"; "i")) | "\(.number) \(.headRefName)"' \
        | while read -r NUM BRANCH; do
          echo "Closing PR #${NUM} (branch: ${BRANCH})"
          gh pr close "$NUM" \
            --repo "${{ github.repository }}" \
            --comment "🧹 **Auto-closed.** Self-assessment PRs are not meant to be merged — the real output is the backlog issues." \
            --delete-branch \
            || echo "WARNING: Failed to close PR #${NUM}, continuing"
        done

  self-assess:
    needs: cleanup
    runs-on: ubuntu-latest
    environment: copilot

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup WireGuard VPN
      run: |
        sudo apt-get update && sudo apt-get install -y wireguard resolvconf
        echo "${{ secrets.WIREGUARD_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
        sudo chmod 600 /etc/wireguard/wg0.conf
        sudo wg-quick up wg0

    - name: Gather metrics snapshot
      run: |
        chmod +x scripts/gather-metrics.sh
        REPORT=$(./scripts/gather-metrics.sh)
        
        # Save to file for the next step (avoids shell escaping issues)
        echo "$REPORT" > /tmp/metrics-report.md
      env:
        PROMETHEUS_URL: http://prometheus.internal:9090
        LOKI_URL: http://loki.internal
        ARGOCD_URL: http://argo.internal
        ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        ARGOCD_APP_NAME: coupon-bot
        CONTAINER_NAME: coupon-bot

    - name: Disconnect VPN
      if: always()
      run: sudo wg-quick down wg0 || true

    - name: Ensure labels exist
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        gh label create self-assess \
          --repo "${{ github.repository }}" \
          --description "Auto-discovered by daily self-assessment workflow" \
          --color "7057ff" \
          --force
        gh label create infra \
          --repo "${{ github.repository }}" \
          --description "Infrastructure issue — cannot be fixed in this repo" \
          --color "d4c5f9" \
          --force
        gh label create priority-high \
          --repo "${{ github.repository }}" \
          --description "Reserved for user-reported high-priority issues (not used by self-assess)" \
          --color "b60205" \
          --force
        gh label create priority-medium \
          --repo "${{ github.repository }}" \
          --description "Medium priority" \
          --color "fbca04" \
          --force
        gh label create priority-low \
          --repo "${{ github.repository }}" \
          --description "Low priority — nice to have" \
          --color "0e8a16" \
          --force

    - name: Create orchestration issue
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        set -euo pipefail
        DATE=$(date -u +%Y-%m-%d)
        REPORT=$(cat /tmp/metrics-report.md)

        ISSUE_URL=$(gh issue create \
          --repo "${{ github.repository }}" \
          --title "Daily self-assessment ${DATE}" \
          --label "self-assess" \
          --body "## Daily Self-Assessment — ${DATE}

        **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

        ---

        ${REPORT}")

        ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -Eo '[0-9]+$')
        if [ -z "$ISSUE_NUMBER" ]; then
          echo "ERROR: Failed to parse issue number from: $ISSUE_URL"
          exit 1
        fi
        echo "Created issue #${ISSUE_NUMBER}"

        # Assign Copilot with custom agent via REST API (retry up to 3 times)
        ASSIGNED=false
        for i in 1 2 3; do
          gh api --method POST \
            "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/assignees" \
            --input - <<EOF
        {
          "assignees": ["copilot-swe-agent[bot]"],
          "agent_assignment": {
            "custom_agent": "self-assess"
          }
        }
        EOF
          && { ASSIGNED=true; echo "Assigned Copilot (self-assess agent) to issue #${ISSUE_NUMBER}"; break; } \
          || { echo "WARNING: Assignment attempt $i failed for issue #${ISSUE_NUMBER}"; sleep 5; }
        done
        if [ "$ASSIGNED" = false ]; then
          echo "ERROR: All 3 assignment attempts failed for issue #${ISSUE_NUMBER}"
          exit 1
        fi
