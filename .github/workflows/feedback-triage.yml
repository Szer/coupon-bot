name: Feedback Triage

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

jobs:
  triage-feedback:
    if: github.event.label.name == 'user-feedback'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup WireGuard VPN
      run: |
        sudo apt-get update && sudo apt-get install -y wireguard resolvconf
        echo "${{ secrets.WIREGUARD_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
        sudo chmod 600 /etc/wireguard/wg0.conf
        sudo wg-quick up wg0

    - name: Ensure labels exist
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        gh label create user-feedback \
          --repo "${{ github.repository }}" \
          --description "Raw user feedback — triaged by product agent only" \
          --color "0075ca" \
          --force
        gh label create feature-request \
          --repo "${{ github.repository }}" \
          --description "Validated feature request from product agent triage" \
          --color "a2eeef" \
          --force
        gh label create bug \
          --repo "${{ github.repository }}" \
          --description "Bug report" \
          --color "d73a4a" \
          --force
        gh label create priority-high \
          --repo "${{ github.repository }}" \
          --description "Reserved for user-reported high-priority issues (not used by project agent)" \
          --color "b60205" \
          --force
        gh label create priority-medium \
          --repo "${{ github.repository }}" \
          --description "Medium priority" \
          --color "fbca04" \
          --force
        gh label create priority-low \
          --repo "${{ github.repository }}" \
          --description "Low priority — nice to have" \
          --color "0e8a16" \
          --force

    - name: Read product agent prompt
      run: |
        {
          echo "AGENT_PROMPT<<PROMPT_EOF"
          cat .github/prompts/product.md
          echo "PROMPT_EOF"
        } >> "$GITHUB_ENV"

    - name: Run product agent for feedback triage
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        show_full_output: "true"
        prompt: |
          <instructions>
          ${{ env.AGENT_PROMPT }}
          </instructions>

          You have been triggered for user feedback triage.
          The feedback issue to triage is #${{ github.event.issue.number }}.
          Read the issue, analyze the feedback, and make a triage decision.
        claude_args: |
          --allowedTools "Read,Grep,Glob,Bash(gh issue:*),Bash(gh api:*),Bash(curl:*),Bash(jq:*),Bash(cat:*),Bash(grep:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(sort:*),Bash(uniq:*),Bash(find:*),Bash(ls:*),Bash(date:*),Bash(echo:*),Bash(git status:*),Bash(git branch),Bash(git log:*),Bash(git --no-pager show:*)"
          --max-turns 20
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}

    - name: Disconnect VPN
      if: always()
      run: sudo wg-quick down wg0 || true
