name: Auto-fix Issues

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
    - name: Find highest priority issue
      id: pick
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        # Get all open project issues, exclude orchestration and infra
        # Priority: priority-high (3) > priority-medium (2) > priority-low/none (1)
        # Then by bump count (comments), then by age (oldest first)
        ISSUE=$(gh issue list \
          --repo "${{ github.repository }}" \
          --label "project" \
          --state open \
          --limit 200 \
          --json number,title,labels,comments,createdAt,assignees \
          --jq '
            [.[]
              | select(.title | test("^(Daily self-assessment|Daily project assessment|Project assessment|Product analysis) \\d{4}-\\d{2}-\\d{2}"; "i") | not)
              | select(.labels | map(.name) | any(. == "infra") | not)
              | select(.assignees | length == 0)
              | .priority = (
                  if (.labels | map(.name) | any(. == "priority-high")) then 3
                  elif (.labels | map(.name) | any(. == "priority-medium")) then 2
                  else 1
                  end)
            ]
            | sort_by([-.priority, -(.comments | length), .createdAt])
            | .[0]
            | .number // empty')

        if [ -z "$ISSUE" ]; then
          echo "No issues to pick up."
          echo "found=false" >> "$GITHUB_OUTPUT"
        else
          echo "Found issue #$ISSUE"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout
      if: steps.pick.outputs.found == 'true'
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      if: steps.pick.outputs.found == 'true'
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Setup WireGuard VPN
      if: steps.pick.outputs.found == 'true'
      run: |
        sudo apt-get update && sudo apt-get install -y wireguard resolvconf
        echo "${{ secrets.WIREGUARD_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
        sudo chmod 600 /etc/wireguard/wg0.conf
        sudo wg-quick up wg0

    - name: Read coding agent prompt
      if: steps.pick.outputs.found == 'true'
      run: |
        {
          echo "AGENT_PROMPT<<PROMPT_EOF"
          cat .github/prompts/coding.md
          echo "PROMPT_EOF"
        } >> "$GITHUB_ENV"

    - name: Run coding agent
      if: steps.pick.outputs.found == 'true'
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        prompt: |
          <instructions>
          ${{ env.AGENT_PROMPT }}
          </instructions>

          Fix issue #${{ steps.pick.outputs.issue }}.
          Read the issue, implement the fix, run tests with `dotnet test -c Release`, and create a PR.
        claude_args: "--max-turns 80"
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
        ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}

    - name: Disconnect VPN
      if: always()
      run: sudo wg-quick down wg0 || true
