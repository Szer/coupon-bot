name: Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  SQLFLUFF_DIALECT: postgres
  DOCKER_IMAGE: flyway/flyway
  SCHEMAS: public

jobs:
  deploy:
    runs-on: ubuntu-22.04-arm

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # run tests
    - uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
    - name: Tests
      run: dotnet test -c Release --logger "trx;LogFileName=test-results.trx"
      
    # upload test results
    - name: Upload dotnet test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: "**/*.trx"
      # Use always() to always run this step to publish test results when there are test failures
      if: ${{ always() }}

    - name: Upload container logs
      uses: actions/upload-artifact@v4
      with:
        name: container-logs
        path: test-artifacts/
      if: ${{ always() }}

    - name: Setup WireGuard VPN
      run: |
        sudo apt-get update && sudo apt-get install -y wireguard resolvconf
        echo "${{ secrets.WIREGUARD_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
        sudo chmod 600 /etc/wireguard/wg0.conf
        sudo wg-quick up wg0
        # Verify VPN is up
        sudo wg show

    # if tests are ok, deploy to production
    - name: Apply migrations to production DB
      run: >-
        docker run --rm
        --network host
        --volume ${{ github.workspace }}/src/migrations:/flyway/sql:ro
        --volume ${{ github.workspace }}/reports:/flyway/reports
        "${{ env.DOCKER_IMAGE }}"
        -url="${{ secrets.DB_PROD_URL }}"
        -user="${{ secrets.DB_PROD_USERNAME }}"
        -password="${{ secrets.DB_PROD_PASSWORD }}" 
        migrate -schemas="${{ env.SCHEMAS }}"

    - name: Disconnect VPN
      if: always()
      run: sudo wg-quick down wg0 || true

    - name: Upload Flyway report
      uses: actions/upload-artifact@v4
      with:
        name: Database Report
        path: reports/

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build and push to GHCR
      uses: docker/build-push-action@v5
      with:
        push: true
        tags: ghcr.io/szer/coupon-bot:${{ github.sha }}, ghcr.io/szer/coupon-bot:latest
        file: ./Dockerfile
        platforms: linux/arm64

  verify-deploy:
    needs: deploy
    runs-on: ubuntu-22.04-arm

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup WireGuard VPN
      run: |
        sudo apt-get update && sudo apt-get install -y wireguard resolvconf
        echo "${{ secrets.WIREGUARD_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
        sudo chmod 600 /etc/wireguard/wg0.conf
        sudo wg-quick up wg0
        sudo wg show

    - name: Verify deployment
      run: ./scripts/verify-deploy.sh
      env:
        ARGOCD_URL: http://argo.internal
        LOKI_URL: http://loki.internal
        PROMETHEUS_URL: http://prometheus.internal:9090
        EXPECTED_IMAGE_TAG: ${{ github.sha }}
        ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        ARGOCD_APP_NAME: coupon-bot
        CONTAINER_NAME: coupon-bot
        READINESS_GRACE_PERIOD: "180"

    - name: Disconnect VPN
      if: always()
      run: sudo wg-quick down wg0 || true

  notify-failure:
    needs: [deploy, verify-deploy]
    if: failure()
    runs-on: ubuntu-latest
    environment: copilot

    steps:
    - name: Ensure required labels exist
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        gh label create deploy-failure \
          --repo "${{ github.repository }}" \
          --description "Automated deploy pipeline failure" \
          --color "d93f0b" \
          --force
        gh label create priority-high \
          --repo "${{ github.repository }}" \
          --description "Reserved for user-reported high-priority issues (not used by project agent)" \
          --color "b60205" \
          --force
        gh label create infra \
          --repo "${{ github.repository }}" \
          --description "Infrastructure issue — cannot be fixed in this repo" \
          --color "d4c5f9" \
          --force

    - name: Create debugging issue and assign SRE agent
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        set -euo pipefail

        ISSUE_URL=$(gh issue create \
          --repo "${{ github.repository }}" \
          --title "Deploy pipeline failed for ${GITHUB_SHA:0:7}" \
          --label "deploy-failure" \
          --body "## Deploy pipeline failed

        **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        **Commit:** \`${{ github.sha }}\`

        A job in the deploy pipeline failed. Follow the incident response runbook to investigate.

        1. Assess severity — is production impacted?
        2. If production is down, rollback first
        3. Read the workflow logs to identify which phase failed
        4. Query ArgoCD, Loki, and Prometheus for diagnostics
        5. If a code fix is needed, create a priority-high issue and assign the coding agent")

        ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -Eo '[0-9]+$')
        if [ -z "$ISSUE_NUMBER" ]; then
          echo "ERROR: Failed to parse issue number from: $ISSUE_URL"
          exit 1
        fi
        echo "Created issue #${ISSUE_NUMBER}"

        # Assign Copilot with SRE custom agent via REST API (retry up to 3 times)
        ASSIGNED=false
        for i in 1 2 3; do
          if gh api --method POST \
            "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/assignees" \
            --input - <<EOF
        {
          "assignees": ["copilot-swe-agent[bot]"],
          "agent_assignment": {
            "custom_agent": "sre"
          }
        }
        EOF
          then
            ASSIGNED=true
            echo "Assigned Copilot (SRE agent) to issue #${ISSUE_NUMBER}"
            break
          else
            echo "WARNING: Assignment attempt $i failed for issue #${ISSUE_NUMBER}"
            sleep 5
          fi
        done
        if [ "$ASSIGNED" = false ]; then
          echo "ERROR: All 3 assignment attempts failed for issue #${ISSUE_NUMBER}"
          exit 1
        fi
