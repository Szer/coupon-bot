name: Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  issues: write
  pull-requests: write
  id-token: write

env:
  SQLFLUFF_DIALECT: postgres
  DOCKER_IMAGE: flyway/flyway
  SCHEMAS: public

jobs:
  deploy:
    runs-on: ubuntu-22.04-arm

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # run tests
    - uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
    - name: Tests
      run: dotnet test -c Release --logger "trx;LogFileName=test-results.trx"
      
    # upload test results
    - name: Upload dotnet test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: "**/*.trx"
      # Use always() to always run this step to publish test results when there are test failures
      if: ${{ always() }}

    - name: Upload container logs
      uses: actions/upload-artifact@v4
      with:
        name: container-logs
        path: test-artifacts/
      if: ${{ always() }}

    - name: Setup WireGuard VPN
      run: |
        chmod +x scripts/setup-vpn.sh
        ./scripts/setup-vpn.sh
      env:
        WIREGUARD_CONFIG: ${{ secrets.WIREGUARD_CONFIG }}
        SPLIT_TUNNEL: "false"  # Full tunnel needed: DB has public endpoint with AKS IP firewall

    # if tests are ok, deploy to production
    - name: Apply migrations to production DB
      run: >-
        docker run --rm
        --network host
        --volume ${{ github.workspace }}/src/migrations:/flyway/sql:ro
        --volume ${{ github.workspace }}/reports:/flyway/reports
        "${{ env.DOCKER_IMAGE }}"
        -url="${{ secrets.DB_PROD_URL }}"
        -user="${{ secrets.DB_PROD_USERNAME }}"
        -password="${{ secrets.DB_PROD_PASSWORD }}" 
        migrate -schemas="${{ env.SCHEMAS }}"

    - name: Disconnect VPN
      if: always()
      run: sudo wg-quick down wg0 || true

    - name: Upload Flyway report
      uses: actions/upload-artifact@v4
      with:
        name: Database Report
        path: reports/

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build and push to GHCR
      uses: docker/build-push-action@v5
      with:
        push: true
        tags: ghcr.io/szer/coupon-bot:${{ github.sha }}, ghcr.io/szer/coupon-bot:latest
        file: ./Dockerfile
        platforms: linux/arm64

  verify-deploy:
    needs: deploy
    runs-on: ubuntu-22.04-arm

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup WireGuard VPN
      run: |
        chmod +x scripts/setup-vpn.sh
        ./scripts/setup-vpn.sh
      env:
        WIREGUARD_CONFIG: ${{ secrets.WIREGUARD_CONFIG }}

    - name: Verify deployment
      run: ./scripts/verify-deploy.sh
      env:
        ARGOCD_URL: http://argo.internal
        LOKI_URL: http://loki.internal
        PROMETHEUS_URL: http://prometheus.internal:9090
        EXPECTED_IMAGE_TAG: ${{ github.sha }}
        ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        ARGOCD_APP_NAME: coupon-bot
        CONTAINER_NAME: coupon-bot
        READINESS_GRACE_PERIOD: "180"

    - name: Disconnect VPN
      if: always()
      run: sudo wg-quick down wg0 || true

  notify-failure:
    needs: [deploy, verify-deploy]
    if: failure()
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup WireGuard VPN
      run: |
        chmod +x scripts/setup-vpn.sh
        ./scripts/setup-vpn.sh
      env:
        WIREGUARD_CONFIG: ${{ secrets.WIREGUARD_CONFIG }}

    - name: Create debugging issue
      id: create-issue
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        set -euo pipefail

        ISSUE_URL=$(gh issue create \
          --repo "${{ github.repository }}" \
          --title "Deploy pipeline failed for ${GITHUB_SHA:0:7}" \
          --label "deploy-failure" \
          --body "## Deploy pipeline failed

        **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        **Commit:** \`${{ github.sha }}\`

        A job in the deploy pipeline failed. Follow the incident response runbook to investigate.

        1. Assess severity — is production impacted?
        2. If production is down, rollback first
        3. Read the workflow logs to identify which phase failed
        4. Query ArgoCD, Loki, and Prometheus for diagnostics
        5. If a code fix is needed, create a priority-high issue with project label")

        ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -Eo '[0-9]+$')
        if [ -z "$ISSUE_NUMBER" ]; then
          echo "ERROR: Failed to parse issue number from: $ISSUE_URL"
          exit 1
        fi
        echo "Created issue #${ISSUE_NUMBER}"
        echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

    - name: Read SRE agent prompt
      run: |
        {
          echo "AGENT_PROMPT<<PROMPT_EOF"
          cat .github/prompts/sre.md
          echo "PROMPT_EOF"
        } >> "$GITHUB_ENV"

    - name: Run SRE agent
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        show_full_output: "true"
        prompt: |
          <instructions>
          ${{ env.AGENT_PROMPT }}
          </instructions>

          A deploy pipeline has failed.
          The deploy-failure issue is #${{ steps.create-issue.outputs.issue_number }}.
          Investigate the incident following the runbook.
        claude_args: |
          --model claude-haiku-4-5-20251001
          --allowedTools "Read,Grep,Glob,Bash(gh issue:*),Bash(gh api:*),Bash(curl:*),Bash(jq:*),Bash(cat:*),Bash(grep:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(sort:*),Bash(uniq:*),Bash(find:*),Bash(ls:*),Bash(date:*),Bash(echo:*),Bash(sleep:*),Bash(git status:*),Bash(git branch),Bash(git log:*),Bash(git --no-pager show:*)"
          --max-turns 25
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
        ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}

    - name: Disconnect VPN
      if: always()
      run: sudo wg-quick down wg0 || true
