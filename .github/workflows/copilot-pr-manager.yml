name: Copilot PR Manager

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manage-copilot-prs:
    runs-on: ubuntu-latest
    steps:
    - name: Manage Copilot PRs
      env:
        GH_TOKEN: ${{ secrets.COPILOT_PR_MANAGER_TOKEN }}
        GUARD_COMMENT: |
          🛑 **Auto-closed by Copilot PR Manager.**

          Non-coding agents (project, product) must not create PRs. Their only deliverables are GitHub issues and comments. This PR was likely created by the Copilot platform after the agent pushed commits.

          The branch has been deleted. If the agent identified real issues, they should exist as GitHub issues in the backlog.
      run: |
        set -euo pipefail

        if [ -z "${GH_TOKEN:-}" ]; then
          echo "::warning::COPILOT_PR_MANAGER_TOKEN secret is not configured. Skipping Copilot PR management."
          exit 0
        fi

        REPO="${{ github.repository }}"
        COPILOT_USER_ID="198982749"

        echo "::group::Scanning for Copilot PRs"

        # List open PRs by Copilot
        COPILOT_PRS=$(gh api "repos/${REPO}/pulls?state=open&per_page=100" \
          --jq "[.[] | select(.user.id == ${COPILOT_USER_ID})]")

        PR_COUNT=$(echo "$COPILOT_PRS" | jq 'length')
        echo "Found ${PR_COUNT} open Copilot PR(s)"

        if [ "$PR_COUNT" -eq 0 ]; then
          echo "No Copilot PRs to process."
          echo "::endgroup::"
        else
          echo "$COPILOT_PRS" | jq -r '.[] | "#\(.number) [\(.head.ref)] \(.title)"'
          echo "::endgroup::"

          # Process each Copilot PR
          echo "$COPILOT_PRS" | jq -c '.[]' | while read -r PR; do
            PR_NUMBER=$(echo "$PR" | jq -r '.number')
            BRANCH=$(echo "$PR" | jq -r '.head.ref')
            BODY=$(echo "$PR" | jq -r '.body // ""')

            # Match the platform-injected markdown marker: > **Custom agent used: project**
            if echo "$BODY" | grep -qiE '^[[:space:]]*>[[:space:]]*\*{0,2}Custom agent used:[[:space:]]*(project|product)\b'; then
              echo "🛑 PR #${PR_NUMBER} is from a non-coding agent (branch: ${BRANCH}) — closing."
              gh pr close "$PR_NUMBER" \
                --repo "$REPO" \
                --comment "$GUARD_COMMENT" \
                --delete-branch \
                || echo "WARNING: Failed to close PR #${PR_NUMBER}"
            else
              echo "✅ PR #${PR_NUMBER} is from coding agent (branch: ${BRANCH}) — keeping."
            fi
          done
        fi

        # Re-run pending workflow runs for Copilot PRs
        # The /approve API is fork-only. For first-time contributor runs, we re-run
        # via PAT so the triggering_actor becomes the PAT owner (trusted).
        echo "::group::Re-running pending workflow runs"

        NOW_EPOCH=$(date -u +%s)
        CUTOFF=$(date -u -d '30 minutes ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
          || date -u -v-30M +%Y-%m-%dT%H:%M:%SZ)

        ACTION_REQUIRED=$(gh api "repos/${REPO}/actions/runs?status=action_required&per_page=100" \
          --jq '.workflow_runs')
        TOTAL_COUNT=$(echo "$ACTION_REQUIRED" | jq 'length')
        echo "Found ${TOTAL_COUNT} action_required workflow run(s) total"

        if [ "$TOTAL_COUNT" -gt 0 ]; then
          # Get branches of remaining open Copilot PRs (after closing non-coding ones)
          OPEN_COPILOT_BRANCHES=$(gh api "repos/${REPO}/pulls?state=open&per_page=100" \
            --jq "[.[] | select(.user.id == ${COPILOT_USER_ID}) | .head.ref]")

          PROCESSED=0
          SKIPPED=0

          while read -r RUN; do
            RUN_ID=$(echo "$RUN" | jq -r '.id')
            RUN_BRANCH=$(echo "$RUN" | jq -r '.head_branch')
            RUN_NAME=$(echo "$RUN" | jq -r '.name')
            RUN_EVENT=$(echo "$RUN" | jq -r '.event')
            RUN_CREATED=$(echo "$RUN" | jq -r '.created_at')

            # Compute age in minutes
            RUN_EPOCH=$(date -u -d "$RUN_CREATED" +%s 2>/dev/null \
              || date -u -jf "%Y-%m-%dT%H:%M:%SZ" "$RUN_CREATED" +%s)
            AGE_MIN=$(( (NOW_EPOCH - RUN_EPOCH) / 60 ))

            # Only process pull_request runs
            if [ "$RUN_EVENT" != "pull_request" ]; then
              continue
            fi

            # Skip stale runs (older than 30 minutes)
            if [[ "$RUN_CREATED" < "$CUTOFF" ]]; then
              echo "⏭️ Skipping stale run ${RUN_ID} (${RUN_NAME}) — ${AGE_MIN}m old"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # Only re-run for open Copilot PR branches
            IS_COPILOT_BRANCH=$(echo "$OPEN_COPILOT_BRANCHES" | jq --arg b "$RUN_BRANCH" 'any(. == $b)')

            if [ "$IS_COPILOT_BRANCH" = "true" ]; then
              echo "🔄 Re-running ${RUN_ID} (${RUN_NAME}) for branch ${RUN_BRANCH} — ${AGE_MIN}m old..."
              gh api "repos/${REPO}/actions/runs/${RUN_ID}/rerun" --method POST \
                || echo "WARNING: Failed to re-run ${RUN_ID}"
              PROCESSED=$((PROCESSED + 1))
            fi
          done < <(echo "$ACTION_REQUIRED" | jq -c '.[]')

          echo "Processed: ${PROCESSED}, Skipped (stale): ${SKIPPED}"
        fi

        echo "::endgroup::"
        echo "Done."
