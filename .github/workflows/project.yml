name: Daily Project Assessment

on:
  schedule:
    - cron: '37 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
    - name: Close stale orchestration issues
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        # Close any open orchestration/summary issues from previous runs
        # Match any issue with project label containing "project assessment" in title
        gh issue list \
          --repo "${{ github.repository }}" \
          --label "project" \
          --state open \
          --json number,title \
          --jq '.[] | select(.title | test("project assessment \\d{4}-\\d{2}-\\d{2}"; "i")) | .number' \
        | while read -r NUM; do
          echo "Closing orchestration issue #${NUM}"
          gh issue close "$NUM" \
            --repo "${{ github.repository }}" \
            --comment "**Auto-closed by cleanup.** Agent did not close this issue in time. Check the workflow run for the agent's analysis summary." \
            || echo "WARNING: Failed to close orchestration issue #${NUM}, continuing"
        done

  project:
    needs: cleanup
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup WireGuard VPN
      run: |
        chmod +x scripts/setup-vpn.sh
        ./scripts/setup-vpn.sh
      env:
        WIREGUARD_CONFIG: ${{ secrets.WIREGUARD_CONFIG }}

    - name: Gather metrics snapshot
      run: |
        chmod +x scripts/gather-metrics.sh
        REPORT=$(./scripts/gather-metrics.sh)

        # Save to file for the next step (avoids shell escaping issues)
        echo "$REPORT" > /tmp/metrics-report.md
      env:
        PROMETHEUS_URL: http://prometheus.internal:9090
        LOKI_URL: http://loki.internal
        ARGOCD_URL: http://argo.internal
        ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        ARGOCD_APP_NAME: coupon-bot
        CONTAINER_NAME: coupon-bot

    - name: Create orchestration issue
      id: create-issue
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        set -euo pipefail
        DATE=$(date -u +%Y-%m-%d)
        REPORT=$(cat /tmp/metrics-report.md)

        ISSUE_URL=$(gh issue create \
          --repo "${{ github.repository }}" \
          --title "Daily project assessment ${DATE}" \
          --label "project" \
          --body "## Daily Project Assessment — ${DATE}

        **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

        ---

        ${REPORT}")

        ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -Eo '[0-9]+$')
        if [ -z "$ISSUE_NUMBER" ]; then
          echo "ERROR: Failed to parse issue number from: $ISSUE_URL"
          exit 1
        fi
        echo "Created issue #${ISSUE_NUMBER}"
        echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

    - name: Load agent prompt and metrics
      run: |
        {
          echo "AGENT_PROMPT<<PROMPT_EOF"
          cat .github/prompts/project.md
          echo "PROMPT_EOF"
        } >> "$GITHUB_ENV"
        {
          echo "METRICS_REPORT<<METRICS_EOF"
          cat /tmp/metrics-report.md
          echo "METRICS_EOF"
        } >> "$GITHUB_ENV"

    - name: Run project agent
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        show_full_output: "true"
        prompt: |
          <instructions>
          ${{ env.AGENT_PROMPT }}
          </instructions>

          <metrics-snapshot>
          ${{ env.METRICS_REPORT }}
          </metrics-snapshot>

          You have been triggered for the daily project assessment.
          The orchestration issue is #${{ steps.create-issue.outputs.issue_number }}.
        claude_args: |
          --model claude-haiku-4-5-20251001
          --allowedTools "Read,Grep,Glob,Bash(gh issue:*),Bash(gh api:*),Bash(curl:*),Bash(jq:*),Bash(cat:*),Bash(grep:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(sort:*),Bash(uniq:*),Bash(find:*),Bash(ls:*),Bash(date:*),Bash(echo:*),Bash(git status:*),Bash(git branch),Bash(git log:*),Bash(git --no-pager show:*)"
          --max-turns 25
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
        ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}

    - name: Close orchestration issue
      if: always() && steps.create-issue.outputs.issue_number
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        gh issue close "${{ steps.create-issue.outputs.issue_number }}" \
          --repo "${{ github.repository }}" \
          --comment "Orchestration issue auto-closed after agent run. See workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

    - name: Disconnect VPN
      if: always()
      run: sudo wg-quick down wg0 || true
