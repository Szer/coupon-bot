name: Product Analysis

on:
  schedule:
    - cron: '15 10 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

jobs:

  cleanup:
    runs-on: ubuntu-latest
    steps:
    - name: Close stale product orchestration issues
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        gh issue list \
          --repo "${{ github.repository }}" \
          --label "product" \
          --state open \
          --json number,title \
          --jq '.[] | select(.title | test("Product analysis \\d{4}-\\d{2}-\\d{2}"; "i")) | .number' \
        | while read -r NUM; do
          echo "Closing stale product orchestration issue #${NUM}"
          gh issue close "$NUM" \
            --repo "${{ github.repository }}" \
            --comment "**Auto-closed by cleanup.** Product agent did not close this issue in time." \
            || echo "WARNING: Failed to close orchestration issue #${NUM}, continuing"
        done

  product-analysis:
    needs: cleanup
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup WireGuard VPN
      run: |
        sudo apt-get update && sudo apt-get install -y wireguard resolvconf
        echo "${{ secrets.WIREGUARD_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
        sudo chmod 600 /etc/wireguard/wg0.conf
        sudo wg-quick up wg0

    - name: Install PostgreSQL client
      run: sudo apt-get install -y postgresql-client

    - name: Gather product data
      run: |
        chmod +x scripts/gather-product-data.sh
        REPORT=$(./scripts/gather-product-data.sh)
        echo "$REPORT" > /tmp/product-report.md
      env:
        PROMETHEUS_URL: http://prometheus.internal:9090
        LOKI_URL: http://loki.internal
        CONTAINER_NAME: coupon-bot
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}

    - name: Create orchestration issue
      id: create-issue
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        set -euo pipefail
        DATE=$(date -u +%Y-%m-%d)
        REPORT=$(cat /tmp/product-report.md)

        ISSUE_URL=$(gh issue create \
          --repo "${{ github.repository }}" \
          --title "Product analysis ${DATE}" \
          --label "product" \
          --body "## Product Analysis — ${DATE}

        **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

        ---

        ${REPORT}")

        ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -Eo '[0-9]+$')
        if [ -z "$ISSUE_NUMBER" ]; then
          echo "ERROR: Failed to parse issue number from: $ISSUE_URL"
          exit 1
        fi
        echo "Created issue #${ISSUE_NUMBER}"
        echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

    - name: Read product agent prompt
      run: |
        {
          echo "AGENT_PROMPT<<PROMPT_EOF"
          cat .github/prompts/product.md
          echo "PROMPT_EOF"
        } >> "$GITHUB_ENV"

    - name: Run product agent
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        show_full_output: "true"
        prompt: |
          <instructions>
          ${{ env.AGENT_PROMPT }}
          </instructions>

          You have been triggered for the scheduled daily product analysis.
          The orchestration issue is #${{ steps.create-issue.outputs.issue_number }}.
        claude_args: |
          --model claude-haiku-4-5-20251001
          --allowedTools "Read,Grep,Glob,Bash(gh issue:*),Bash(gh api:*),Bash(curl:*),Bash(jq:*),Bash(cat:*),Bash(grep:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(sort:*),Bash(uniq:*),Bash(find:*),Bash(ls:*),Bash(date:*),Bash(echo:*),Bash(git status:*),Bash(git branch),Bash(git log:*),Bash(git --no-pager show:*)"
          --max-turns 20
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}

    - name: Close orchestration issue
      if: always() && steps.create-issue.outputs.issue_number
      env:
        GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
      run: |
        gh issue close "${{ steps.create-issue.outputs.issue_number }}" \
          --repo "${{ github.repository }}" \
          --comment "Orchestration issue auto-closed after agent run. See workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

    - name: Disconnect VPN
      if: always()
      run: sudo wg-quick down wg0 || true
